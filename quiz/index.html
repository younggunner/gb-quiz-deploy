<title>GreaseBook Invitation Form</title>
<link rel="canonical" href="https://quiz.greasebook.com/quiz">

<!-- Google Tag Manager -->
<script>
(function(w,d,s,l,i){
  w[l]=w[l]||[];
  w[l].push({'gtm.start': new Date().getTime(), event:'gtm.js'});
  var f=d.getElementsByTagName(s)[0],
      j=d.createElement(s),
      dl=l!='dataLayer'?'&l='+l:'';
  j.async=true;
  j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
  f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-5PQGM83');

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{display:flex;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5PQGM83" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div class="logo-bar">
  <img src="../assets/gb-logo-alt.png" alt="GreaseBook">
</div>

<div class="tf-wrap">
  <iframe id="typeform-full" allow="camera; microphone; autoplay; encrypted-media; fullscreen"></iframe>
</div>

<!-- Attribution script — ported VERBATIM from the live Instapage page (captured 2026-07-13).
     ONE copy only. Do not duplicate (June 2026 incident: a second copy blanked all quiz UTMs). -->
<script>
(function () {
  function uuidv4() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, function(c){
      return (c ^ (crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c/4)).toString(16);
    });
  }
  var gb_uid;
  try {
    gb_uid = localStorage.getItem('gb_uid');
    if (!gb_uid) { gb_uid = uuidv4(); localStorage.setItem('gb_uid', gb_uid); }
  } catch (e) { gb_uid = uuidv4(); }

  function readCookie(name) {
    var m = document.cookie.match('(^|;)\\s*' + name + '=([^;]+)');
    return m ? decodeURIComponent(m[2]) : '';
  }
  var fbp = readCookie('_fbp');

  // Extract real GA4 client_id from _ga cookie (format: GA1.1.XXXXXXXXX.XXXXXXXXX)
  var gaCookie = readCookie('_ga');
  var gaClientId = '';
  if (gaCookie) {
    var gaParts = gaCookie.split('.');
    if (gaParts.length >= 4) gaClientId = gaParts[2] + '.' + gaParts[3];
  }

  var params = new URLSearchParams(window.location.search);
  var hidden = {};
  ['utm_source','utm_medium','utm_campaign','utm_content','utm_term',
   'fbclid','gclid','source'].forEach(function (k) {
    var v = params.get(k);
    if (v) hidden[k] = v;
  });
  // Fallback: first-touch UTMs persisted from an earlier site visit (e.g. Capterra → homepage → quiz)
  if (!hidden.utm_source && !hidden.utm_medium && !hidden.utm_campaign) {
    try {
      var ft = JSON.parse(localStorage.getItem('gb_first_touch') || 'null');
      if (ft) ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','gclid','fbclid','landing_page','referrer'].forEach(function(k) {
        if (ft[k] && !hidden[k]) hidden[k] = ft[k];
      });
    } catch(e) {}
  }

  // Cross-domain attribution from greasebook.com gb-attr.js (cookie set on .greasebook.com)
  try {
    var gbAttrRaw = readCookie('gb_attr');
    if (gbAttrRaw) {
      var gbAttr = JSON.parse(gbAttrRaw);
      if (gbAttr.origin_referrer && !hidden.origin_referrer) hidden.origin_referrer = gbAttr.origin_referrer;
      // Pull UTMs from cookie when URL didn't have any (organic → /quiz directly)
      ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','gclid','fbclid'].forEach(function(k){
        if (gbAttr[k] && !hidden[k]) hidden[k] = gbAttr[k];
      });
      // Build page_journey: greasebook.com hops (from cookie) + current quiz pageview
      var journey = Array.isArray(gbAttr.journey) ? gbAttr.journey.slice() : [];
      journey.push({ u: window.location.pathname, t: Date.now(), d: 'quiz' });
      // Mark non-quiz entries with domain hint for the dashboard renderer
      journey.forEach(function(j){ if (!j.d) j.d = 'gb'; });
      hidden.page_journey = JSON.stringify(journey);
    }
  } catch(e) {}
  if (!hidden.source) hidden.source = 'InviteBakedIntoInstapage';
  hidden.gb_uid = gb_uid;
  if (fbp) hidden.fbp = fbp;
  if (gaClientId) hidden.ga_client_id = gaClientId;

  // Capture landing page and referrer for cross-page attribution
  hidden.landing_page = window.location.origin + window.location.pathname;
  if (document.referrer) hidden.referrer = document.referrer;

  function buildSrc() {
    var qs = Object.keys(hidden).map(function (k) {
      return encodeURIComponent(k) + '=' + encodeURIComponent(hidden[k]);
    }).join('&');
    return 'https://form.typeform.com/to/sTbsRn' + (qs ? '?' + qs : '');
  }

  var iframe = document.getElementById('typeform-full');
  iframe.src = buildSrc();

  // Retry GA4 client_id capture — cookie may not be set on first paint
  function retryGa() {
    if (hidden.ga_client_id) return;
    var m = document.cookie.match('(^|;)\\s*_ga=([^;]+)');
    if (m) {
      var gp = decodeURIComponent(m[2]).split('.');
      if (gp.length >= 4) {
        hidden.ga_client_id = gp[2] + '.' + gp[3];
        iframe.src = buildSrc();
      }
    }
  }
  setTimeout(retryGa, 1500);
  setTimeout(retryGa, 3500);

  // Debug: browser console → __gbAttribution()
  window.__gbAttribution = function() { return { gb_uid: gb_uid, hidden: hidden, src: iframe.src }; };
})();
</script>

</body>
</html>
